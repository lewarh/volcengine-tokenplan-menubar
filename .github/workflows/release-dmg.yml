name: release-dmg

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Swift version
        run: swift --version

      - name: Build app bundle
        run: ./script/package_macos_app.sh

      - name: Build DMG
        run: ./script/build_dmg.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Volcengine-TokenPlan-Menubar.dmg
          generate_release_notes: true
