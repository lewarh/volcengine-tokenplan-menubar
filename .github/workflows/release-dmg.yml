name: release-dmg

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-dmg:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Swift version
        run: swift --version

      - name: Build app bundle
        run: ./script/package_macos_app.sh

      - name: Build DMG
        run: ./script/build_dmg.sh

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_name="${GITHUB_REF_NAME}"
          else
            tag_name="manual-${GITHUB_RUN_NUMBER}"
          fi

          gh release view "$tag_name" >/dev/null 2>&1 \
            || gh release create "$tag_name" --title "$tag_name" --generate-notes
          gh release upload "$tag_name" dist/Volcengine-TokenPlan-Menubar.dmg --clobber
